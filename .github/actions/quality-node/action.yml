name: Node quality check
description: Install, build, test, typecheck, and run CI benchmarks for Node/TypeScript packages

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm

    - shell: bash
      run: npm ci

    - shell: bash
      run: npm run build

    - shell: bash
      run: npm test

    - shell: bash
      run: npm run typecheck

    - shell: bash
      run: npm run bench:ci
