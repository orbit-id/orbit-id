# Dependabot version updates for the Orbit ID monorepo.
# See https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm workspaces (root package-lock.json covers packages/* + benchmark)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /packages/go
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: maven
    directory: /packages/java
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      maven-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /packages/rust
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      cargo-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: composer
    directory: /packages/php
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      composer-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
